version: '3.8'

services:
  sessionmaster-sync:
    build: .
    container_name: sessionmaster-sync
    restart: unless-stopped
    ports:
      # 左侧端口按需修改（如 5790:5789 使用主机 5790 映射容器 5789）
      # 或直接改 PORT 环境变量 + 左侧端口一起改
      - "${HOST_PORT:-5789}:${PORT:-5789}"
    volumes:
      - ./data:/app/data
    environment:
      - TZ=Asia/Shanghai
      # 自定义端口：取消注释并修改下面这行（默认 5789）
      # - PORT=5789
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:${PORT:-5789}/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
